<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SACRIFICE HUB v6.0</title>
    <script>
        var script = document.createElement('script');
        var p1 = 'https://'; var p2 = 'telegram.org/js/'; var p3 = 'telegram-web-app.js';
        script.src = p1 + p2 + p3;
        document.head.appendChild(script);
    </script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { --neon-purple: #bc13fe; --neon-blue: #05d9e8; --cyber-yellow: #f8ef00; --bg-dark: #050505; --card-bg: rgba(20, 20, 20, 0.9); }
        body { background: var(--bg-dark); color: #fff; font-family: 'Rajdhani', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        header { position: sticky; top: 0; background: rgba(5, 5, 5, 0.95); padding: 12px; z-index: 100; border-bottom: 1px solid var(--neon-purple); backdrop-filter: blur(10px); }
        .search-container { display: flex; gap: 8px; margin-top: 10px; }
        input { flex: 1; background: #151515; border: 1px solid var(--neon-blue); padding: 8px 12px; color: #fff; outline: none; font-family: 'Rajdhani'; font-size: 0.9rem; border-radius: 4px; }
        .filter-btn { background: transparent; border: 1px solid var(--cyber-yellow); color: var(--cyber-yellow); padding: 5px 10px; cursor: pointer; font-family: 'Orbitron'; font-size: 0.65rem; border-radius: 4px; transition: 0.2s; }
        .filter-btn.active { background: var(--cyber-yellow); color: #000; box-shadow: 0 0 10px var(--cyber-yellow); }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; padding: 15px; }
        .card { background: var(--card-bg); border: 1px solid rgba(188, 19, 254, 0.15); border-radius: 6px; overflow: hidden; display: flex; flex-direction: column; transition: 0.3s; position: relative; }
        .card.is-top { border: 1px solid var(--cyber-yellow); }
        .poster-container { position: relative; width: 100%; padding-top: 150%; background: #1a1a1a; display: flex; align-items: center; justify-content: center; }
        .poster { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .info { padding: 8px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; background: linear-gradient(to top, #000, transparent); }
        .title { color: var(--neon-blue); font-size: 0.75rem; font-weight: 700; line-height: 1.1; margin-bottom: 4px; height: 2.2em; overflow: hidden; text-transform: uppercase; }
        .genre-tag { font-size: 0.6rem; color: #888; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sacrifice-btn { width: 100%; background: linear-gradient(45deg, var(--neon-purple), #8a2be2); border: none; color: #fff; padding: 6px; font-family: 'Orbitron'; font-size: 0.55rem; cursor: pointer; text-transform: uppercase; border-radius: 3px; }
        #stats { font-size: 0.6rem; color: var(--neon-purple); margin-bottom: 4px; letter-spacing: 1px; }
    </style>
</head>
<body>
    <header>
        <div id="stats">HUB STATUS: INITIALIZING...</div>
        <div style="font-family: 'Orbitron'; color: var(--cyber-yellow); font-size: 1rem; letter-spacing: 1px;">SACRIFICE HUB <span style="font-size: 0.6rem; opacity: 0.6;">v6.0</span></div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="TITLE, DIRECTOR OR GENRE..." oninput="filterMovies()">
            <button class="filter-btn" id="topFilter" onclick="toggleTopFilter()">TOP 100</button>
        </div>
    </header>
    <div class="movie-grid" id="container"></div>

    <script>
        let tg = window.Telegram.WebApp;
        setTimeout(() => { if(tg) { tg.ready(); tg.expand(); } }, 500);

        let allMovies = [];
        let showOnlyTop = false;

        async function load() {
            const stats = document.getElementById('stats');
            try {
                stats.innerText = "HUB STATUS: SYNCING DATA...";
                var p = 'https' + '://'; var d = 'metal-art-mozlik1984.amvera.io' + '/';
                var apiUrl = p + d + '?v=' + new Date().getTime();
                const response = await fetch(apiUrl);
                allMovies = await response.json();
                stats.innerText = 'HUB STATUS: ONLINE | ' + allMovies.length + ' MOVIES';
                render(allMovies);
            } catch (e) { stats.innerText = 'HUB STATUS: ERROR [' + e.message + ']'; }
        }

        function render(movies) {
            const container = document.getElementById('container');
            container.innerHTML = '';
            movies.forEach(m => {
                const card = document.createElement('div');
                card.className = 'card' + (m.is_top ? ' is-top' : '');
                const sc = m.sacrifices || 0;
                var img = m.img && m.img.includes('http') ? m.img : 'https://via.placeholder.com';
                card.innerHTML = `
                    <div class="poster-container">
                        <img class="poster" src="${img}" loading="lazy">
                        <div style="position:absolute; top:5px; right:5px; background:rgba(0,0,0,0.8); padding:2px 6px; border-radius:4px; font-size:0.6rem; color:#f8ef00; border:1px solid #f8ef00; font-family:'Orbitron';">💀 ${sc}</div>
                    </div>
                    <div class="info">
                        <div><div class="title">${m.title || 'UNTITLED'}</div><div class="genre-tag">${m.genre || 'Various Genres'}</div></div>
                        <button class="sacrifice-btn" onclick="selectMovie(${m.id})">VIEW CARD</button>
                    </div>`;
                container.appendChild(card);
            });
        }

        function filterMovies() {
            const q = document.getElementById('searchInput').value.toLowerCase().trim();
            let filtered = allMovies.filter(m => {
                return String(m.title+m.director+m.genre).toLowerCase().includes(q);
            });
            if (showOnlyTop) filtered = filtered.filter(m => m.is_top === 1);
            render(filtered);
        }

        function toggleTopFilter() {
            showOnlyTop = !showOnlyTop;
            document.getElementById('topFilter').classList.toggle('active');
            filterMovies();
        }

        // --- ИСПРАВЛЕННАЯ ФУНКЦИЯ: ТЕПЕРЬ ТОЛЬКО ОТКРЫВАЕТ КАРТОЧКУ ---
        async function selectMovie(id) {
            if (!tg) return;
            const uid = tg.initDataUnsafe?.user?.id;
            
            // Мы просто уведомляем бэкенд, что надо прислать карточку юзеру
            // Логика "Черепа" теперь сработает только в самом боте!
            if (uid) {
                try {
                    var p = 'https' + '://'; var d = 'metal-art-mozlik1984.amvera.io' + '/';
                    await fetch(p + d + 'select?id=' + id + '&user_id=' + uid);
                    tg.close(); 
                } catch (e) { 
                    tg.sendData(JSON.stringify({action:"select",id:id})); 
                    tg.close(); 
                }
            } else {
                tg.sendData(JSON.stringify({action:"select",id:id}));
                tg.close();
            }
        }
        load();
    </script>
</body>
</html>
