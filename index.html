<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyberpunk Movie Hub</title>
    <!-- Подключаем Telegram SDK правильно -->
    <script src="https://telegram.org"></script>
    <!-- Подключаем шрифты правильно -->
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root {
            --neon-purple: #bc13fe;
            --neon-blue: #05d9e8;
            --cyber-yellow: #f8ef00;
            --bg-dark: #0d0d0d;
        }

        body {
            background: var(--bg-dark);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            padding: 15px;
            overflow-x: hidden;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--cyber-yellow);
            text-shadow: 0 0 10px rgba(248, 239, 0, 0.5);
            font-size: 1.5rem;
            border-left: 4px solid var(--neon-purple);
            padding-left: 10px;
        }

        .movie-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(188, 19, 254, 0.3);
            border-radius: 8px;
            padding: 10px;
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        .card:active { transform: scale(0.95); border-color: var(--neon-blue); }

        .poster {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 4px;
            background: #1a1a1a;
        }

        .title {
            margin: 8px 0 4px;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--neon-blue);
        }

        .btn-fav {
            width: 100%;
            background: transparent;
            border: 1px solid var(--neon-purple);
            color: var(--neon-purple);
            padding: 5px;
            margin-top: 8px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
        }

        .scanline {
            width: 100%; height: 2px;
            background: rgba(188, 19, 254, 0.1);
            position: fixed; top: 0; left: 0;
            z-index: 10; pointer-events: none;
            animation: scan 4s linear infinite;
        }

        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body>
    <div class="scanline"></div>
    <h1>Sacrifice Selection</h1>
    
    <div class="movie-grid" id="movie-container">
        <!-- Заглушка на время загрузки -->
        <div style="grid-column: 1/3; text-align: center; color: var(--neon-purple);">SCANNING THE DATABASE...</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // ФУНКЦИЯ ЗАГРУЗКИ ДАННЫХ ИЗ AMVERA
        async function loadMovies() {
            try {
                // Прямой запрос к твоему боту
                const response = await fetch('https://metal-art-mozlik1984.amvera.io/');
                const movies = await response.json();
                
                const container = document.getElementById('movie-container');
                container.innerHTML = ''; 

                if (movies.length === 0) {
                    container.innerHTML = '<div style="grid-column: 1/3; text-align:center;">THE VAULT IS EMPTY</div>';
                    return;
                }

                movies.forEach(movie => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${movie.img}" class="poster" onerror="this.src='https://via.placeholder.com'">
                        <div class="title">${movie.title}</div>
                        <button class="btn-fav" onclick="addToFav(${movie.id})">SACRIFICE</button>
                    `;
                    container.appendChild(card);
                });
            } catch (err) {
                console.error("Connection error:", err);
                document.getElementById('movie-container').innerHTML = 
                    '<div style="color:red; grid-column: 1/3; text-align:center;">ERROR: OFFLINE</div>';
            }
        }

        function addToFav(id) {
            tg.sendData(JSON.stringify({action: "add_fav", movie_id: id}));
            tg.close();
        }

        // Запуск при открытии
        loadMovies();
    </script>
</body>
</html>
