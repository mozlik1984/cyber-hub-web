<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CULT CINEMA HUB v9.0</title>
    <script>
        // ЗАЩИЩЕННАЯ СКЛЕЙКА СКРИПТА TELEGRAM
        var s = document.createElement('script');
        var p = 'https' + '://'; var d = 'telegram.org/js/'; var f = 'telegram-web-app.js';
        s.src = p + d + f;
        document.head.appendChild(s);
    </script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { --neon-purple: #bc13fe; --neon-blue: #05d9e8; --cyber-yellow: #f8ef00; --bg-dark: #050505; --card-bg: rgba(20, 20, 20, 0.9); }
        body { background: var(--bg-dark); color: #fff; font-family: 'Rajdhani', sans-serif; margin: 0; padding: 0; overflow: hidden; }
        header { position: sticky; top: 0; background: rgba(5, 5, 5, 0.95); padding: 12px; z-index: 100; border-bottom: 1px solid var(--neon-purple); backdrop-filter: blur(10px); }
        .search-container { display: flex; gap: 8px; margin-top: 10px; }
        input { flex: 1; background: #151515; border: 1px solid var(--neon-blue); padding: 8px 12px; color: #fff; outline: none; border-radius: 4px; font-family: 'Rajdhani'; font-size: 0.9rem; }
        .filter-btn { background: transparent; border: 1px solid var(--cyber-yellow); color: var(--cyber-yellow); padding: 5px 10px; cursor: pointer; font-family: 'Orbitron'; font-size: 0.65rem; border-radius: 4px; }
        .filter-btn.active { background: var(--cyber-yellow); color: #000; box-shadow: 0 0 10px var(--cyber-yellow); }
        
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; padding: 15px; height: calc(100vh - 120px); overflow-y: auto; }
        .card { background: var(--card-bg); border: 1px solid rgba(188, 19, 254, 0.15); border-radius: 6px; overflow: hidden; display: flex; flex-direction: column; position: relative; transition: 0.3s; }
        .poster-container { position: relative; width: 100%; padding-top: 150%; background: #1a1a1a; cursor: pointer; }
        .poster { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .sac-badge { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.8); padding: 2px 6px; border-radius: 4px; font-size: 0.6rem; color: var(--cyber-yellow); border: 1px solid var(--cyber-yellow); font-family: 'Orbitron'; }
        
        .info { padding: 8px; flex-grow: 1; }
        .title { color: var(--neon-blue); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; height: 2.2em; overflow: hidden; line-height: 1.1; }
        .sacrifice-btn { width: 100%; background: linear-gradient(45deg, var(--neon-purple), #8a2be2); border: none; color: #fff; padding: 6px; font-family: 'Orbitron'; font-size: 0.55rem; cursor: pointer; border-radius: 3px; margin-top: 5px; text-transform: uppercase; }

        /* KINOZAL OVERLAY */
        #videoOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .video-container { width: 95%; max-width: 800px; aspect-ratio: 16/9; background: #000; border: 1px solid var(--neon-purple); box-shadow: 0 0 30px rgba(188, 19, 254, 0.3); }
        .video-controls { margin-top: 25px; display: flex; gap: 15px; width: 95%; max-width: 800px; }
        .v-btn { flex: 1; padding: 12px; font-family: 'Orbitron'; font-size: 0.7rem; border-radius: 5px; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-close { background: #1a1a1a; border: 1px solid #444; color: #aaa; }
        .btn-select { background: var(--cyber-yellow); border: none; color: #000; box-shadow: 0 0 20px var(--cyber-yellow); font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <div id="stats" style="font-size: 0.6rem; color: var(--neon-purple); margin-bottom: 4px; letter-spacing: 1px;">HUB STATUS: SYNCING...</div>
        <div style="font-family: 'Orbitron'; color: var(--cyber-yellow); font-size: 1rem; letter-spacing: 2px;">THE VOID ARCHIVE</div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="SEARCH ARCHIVE..." oninput="filterMovies()">
            <button class="filter-btn" id="topFilter" onclick="toggleTopFilter()">TOP 100</button>
        </div>
    </header>

    <div class="movie-grid" id="container"></div>

    <div id="videoOverlay">
        <div class="video-container" id="player"></div>
        <div class="video-controls">
            <button class="v-btn btn-close" onclick="closePlayer()">BACK TO HUB</button>
            <button class="v-btn btn-select" id="selectBtn">SACRIFICE NOW</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        if(tg) { tg.ready(); tg.expand(); }

        let allMovies = [];
        let showOnlyTop = false;

        async function load() {
            const stats = document.getElementById('stats');
            try {
                // ЗАЩИЩЕННАЯ СКЛЕЙКА API
                var p = 'https' + '://'; 
                var d = 'metal-art-mozlik1984.amvera.io' + '/';
                var u = p + d + '?v=' + new Date().getTime();
                
                const response = await fetch(u);
                allMovies = await response.json();
                stats.innerText = 'ONLINE | ' + allMovies.length + ' MASTERPIECES';
                render(allMovies);
            } catch (e) { stats.innerText = 'OFFLINE'; }
        }

        function render(movies) {
            const container = document.getElementById('container');
            container.innerHTML = '';
            movies.forEach(m => {
                const card = document.createElement('div');
                card.className = 'card';
                // Защита постера
                var img = m.img && m.img.includes('http') ? m.img : 'https' + '://' + '://via.placeholder.com';
                
                card.innerHTML = `
                    <div class="poster-container">
                        <img class="poster" src="${img}" onclick="openPlayer('${m.t_id}', ${m.id})">
                        <div class="sac-badge">💀 ${m.sacrifices || 0}</div>
                    </div>
                    <div class="info">
                        <div class="title">${m.title}</div>
                        <button class="sacrifice-btn" onclick="openPlayer('${m.t_id}', ${m.id})">VIEW RITUAL</button>
                    </div>`;
                container.appendChild(card);
            });
        }

        function openPlayer(ytId, movieId) {
            const overlay = document.getElementById('videoOverlay');
            const playerDiv = document.getElementById('player');
            overlay.style.display = 'flex';
            
            // ЗАЩИЩЕННАЯ СКЛЕЙКА YOUTUBE EMBED
            var y_p = 'https' + '://' + 'www.youtube.com' + '/';
            var y_u = y_p + 'embed' + '/' + ytId + '?autoplay=1&rel=0';
            
            playerDiv.innerHTML = '<iframe width="100%" height="100%" src="' + y_u + '" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>';
            
            document.getElementById('selectBtn').onclick = () => selectMovie(movieId);
        }

        function closePlayer() {
            document.getElementById('videoOverlay').style.display = 'none';
            document.getElementById('player').innerHTML = '';
        }

        async function selectMovie(id) {
            const uid = tg.initDataUnsafe?.user?.id;
            if (uid) {
                // ЗАЩИЩЕННАЯ СКЛЕЙКА SELECT ЗАПРОСА
                var p = 'https' + '://'; 
                var d = 'metal-art-mozlik1984.amvera.io' + '/';
                var u = p + d + 'select?id=' + id + '&user_id=' + uid;
                
                await fetch(u);
                tg.close();
            } else {
                tg.sendData(JSON.stringify({action:"select", id:id}));
                tg.close();
            }
        }

        function filterMovies() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            let f = allMovies.filter(m => (m.title + m.director + m.genre).toLowerCase().includes(q));
            if (showOnlyTop) f = f.filter(m => m.is_top === 1);
            render(f);
        }

        function toggleTopFilter() {
            showOnlyTop = !showOnlyTop;
            document.getElementById('topFilter').classList.toggle('active');
            filterMovies();
        }

        load();
    </script>
</body>
</html>
