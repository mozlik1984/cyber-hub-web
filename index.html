<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Cinema Hub v8.0</title>
    <script src="https://telegram.org"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { --neon-purple: #bc13fe; --neon-blue: #05d9e8; --cyber-yellow: #f8ef00; --bg-dark: #0d0d0d; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Rajdhani', sans-serif; margin: 0; padding: 10px; overflow-x: hidden; }
        h1 { font-family: 'Orbitron', sans-serif; text-transform: uppercase; color: var(--cyber-yellow); font-size: 1.1rem; border-left: 3px solid var(--neon-purple); padding-left: 10px; margin: 10px 0; }
        
        /* ИСПРАВЛЕНО: Сетка 3 в ряд */
        .movie-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 15px; }
        
        .card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(188, 19, 254, 0.3); border-radius: 4px; padding: 5px; display: flex; flex-direction: column; transition: 0.2s; position: relative; }
        .poster { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 2px; background: #1a1a1a; cursor: pointer; }
        .title { margin: 5px 0; font-weight: 700; font-size: 0.65rem; color: var(--neon-blue); text-transform: uppercase; height: 2.4em; overflow: hidden; line-height: 1.2; }
        .btn-fav { width: 100%; background: transparent; border: 1px solid var(--neon-purple); color: var(--neon-purple); padding: 4px; cursor: pointer; font-family: 'Orbitron'; font-size: 0.5rem; text-transform: uppercase; }
        
        /* ИСПРАВЛЕНО: Контейнер для плеера (решение ошибки со скрина) */
        #video-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        .video-wrapper { width: 95%; aspect-ratio: 16/9; border: 1px solid var(--neon-blue); }
        .close-btn { margin-top: 15px; background: var(--cyber-yellow); color: #000; border: none; padding: 8px 20px; font-family: 'Orbitron'; font-size: 0.7rem; cursor: pointer; }

        .scanline { width: 100%; height: 2px; background: rgba(188, 19, 254, 0.1); position: fixed; top: 0; left: 0; z-index: 10; pointer-events: none; animation: scan 4s linear infinite; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>

<body>
    <div class="scanline"></div>
    <div id="video-overlay">
        <div class="video-wrapper" id="player-container"></div>
        <button class="close-btn" onclick="closePlayer()">BACK TO HUB</button>
    </div>

    <h1>Sacrifice Selection</h1>
    <div class="movie-grid" id="movie-container">
        <div style="grid-column: 1/4; text-align: center; color: var(--neon-purple); font-size: 0.8rem;">SCANNING THE VOID...</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        async function loadMovies() {
            try {
                const response = await fetch('https://metal-art-mozlik1984.amvera.io/');
                const movies = await response.json();
                const container = document.getElementById('movie-container');
                container.innerHTML = ''; 

                if (movies.length === 0) {
                    container.innerHTML = '<div style="grid-column: 1/4; text-align:center;">VAULT EMPTY</div>';
                    return;
                }

                movies.forEach(movie => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    // Клик по постеру открывает трейлер в витрине
                    // Кнопка SACRIFICE отправляет команду в бот
                    card.innerHTML = `
                        <img src="${movie.img}" class="poster" onclick="openPlayer('${movie.t_id}')" onerror="this.src='https://via.placeholder.com'">
                        <div class="title">${movie.title}</div>
                        <button class="btn-fav" onclick="sacrifice('${movie.id}')">SACRIFICE</button>
                    `;
                    container.appendChild(card);
                });
            } catch (err) {
                document.getElementById('movie-container').innerHTML = '<div style="color:red; grid-column:1/4; text-align:center;">OFFLINE</div>';
            }
        }

        // ИСПРАВЛЕНО: Открытие плеера прямо в WebApp
        function openPlayer(tid) {
            if (!tid || tid.length < 5) return;
            const container = document.getElementById('player-container');
            container.innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com{tid}?autoplay=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
            document.getElementById('video-overlay').style.display = 'flex';
        }

        function closePlayer() {
            document.getElementById('player-container').innerHTML = '';
            document.getElementById('video-overlay').style.display = 'none';
        }

        function sacrifice(id) {
            const uid = tg.initDataUnsafe?.user?.id;
            // Сначала пробуем через API, чтобы не закрывать витрину
            fetch(`https://metal-art-mozlik1984.amvera.io{id}&user_id=${uid}`)
                .then(() => { tg.showAlert("RITUAL STARTED. CHECK THE BOT. 💀"); })
                .catch(() => { tg.sendData(JSON.stringify({action: "sac", id: id})); });
        }

        loadMovies();
    </script>
</body>
</html>
