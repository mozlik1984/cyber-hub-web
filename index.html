<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CULT HUB v8.0</title>
    <script src="https://telegram.org"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { --neon-purple: #bc13fe; --neon-blue: #05d9e8; --cyber-yellow: #f8ef00; --bg-dark: #0d0d0d; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Rajdhani', sans-serif; margin: 0; padding: 10px; overflow-x: hidden; }
        
        header { position: sticky; top: 0; background: rgba(13, 13, 13, 0.9); padding: 10px; z-index: 100; border-bottom: 1px solid var(--neon-purple); backdrop-filter: blur(5px); }
        h1 { font-family: 'Orbitron', sans-serif; text-transform: uppercase; color: var(--cyber-yellow); font-size: 1rem; margin: 0; }

        /* ИСПРАВЛЕНО: Сетка 3 в ряд */
        .movie-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 15px; }
        
        .card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(188, 19, 254, 0.3); border-radius: 4px; padding: 5px; display: flex; flex-direction: column; position: relative; }
        .poster { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 2px; background: #1a1a1a; cursor: pointer; }
        .title { margin: 5px 0; font-weight: 700; font-size: 0.6rem; color: var(--neon-blue); text-transform: uppercase; height: 2.4em; overflow: hidden; line-height: 1.2; font-family: 'Orbitron'; }
        
        .btn-sac { width: 100%; background: linear-gradient(45deg, var(--neon-purple), #8a2be2); border: none; color: #fff; padding: 4px; cursor: pointer; font-family: 'Orbitron'; font-size: 0.45rem; text-transform: uppercase; border-radius: 2px; }

        /* ВСТРОЕННЫЙ ПЛЕЕР (Оверлей) */
        #video-layer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        .video-cont { width: 95%; aspect-ratio: 16/9; border: 1px solid var(--neon-blue); box-shadow: 0 0 15px var(--neon-blue); }
        .close-btn { margin-top: 20px; background: var(--cyber-yellow); color: #000; border: none; padding: 8px 20px; font-family: 'Orbitron'; font-size: 0.7rem; cursor: pointer; font-weight: bold; }

        .scanline { width: 100%; height: 2px; background: rgba(188, 19, 254, 0.1); position: fixed; top: 0; left: 0; z-index: 10; pointer-events: none; animation: scan 4s linear infinite; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body>
    <div class="scanline"></div>
    
    <!-- СЛОЙ ПЛЕЕРА -->
    <div id="video-layer">
        <div class="video-cont" id="player-box"></div>
        <button class="close-btn" onclick="closeVideo()">BACK TO ARCHIVE</button>
    </div>

    <header>
        <h1>Sacrifice Selection <span style="font-size: 0.6rem; opacity: 0.5;">v8.0</span></h1>
    </header>
    
    <div class="movie-grid" id="movie-container">
        <div style="grid-column: 1/4; text-align: center; color: var(--neon-purple); font-size: 0.8rem; margin-top: 50px;">
            SCANNING THE VOID...
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        if(tg) { tg.expand(); tg.ready(); }

        // ЗАГРУЗКА ДАННЫХ
        async function load() {
            try {
                // Склейка URL для обхода кэша и защиты
                var p = 'https' + '://'; 
                var d = 'metal-art-mozlik1984.amvera.io' + '/';
                var u = p + d + '?v=' + new Date().getTime();
                
                const response = await fetch(u);
                const movies = await response.json();
                render(movies);
            } catch (err) {
                document.getElementById('movie-container').innerHTML = 
                    '<div style="color:red; grid-column:1/4; text-align:center;">CONNECTION LOST</div>';
            }
        }

        function render(movies) {
            const container = document.getElementById('movie-container');
            container.innerHTML = ''; 

            movies.forEach(m => {
                const card = document.createElement('div');
                card.className = 'card';
                // Клик по постеру открывает плеер, кнопка - карточку в боте
                card.innerHTML = `
                    <img src="${m.img}" class="poster" onclick="play('${m.t_id}')" onerror="this.src='https://via.placeholder.com'">
                    <div class="title">${m.title}</div>
                    <button class="btn-sac" onclick="sacrifice('${m.id}')">SACRIFICE</button>
                `;
                container.appendChild(card);
            });
        }

        // ВНУТРЕННИЙ ПЛЕЕР (Решает проблему ошибки YouTube)
        function play(tid) {
            if (!tid || tid === "None" || tid.length < 5) {
                tg.showAlert("NO DIRECT LINK. USE THE BOT CARD.");
                return;
            }
            const box = document.getElementById('player-box');
            // Используем формат /embed/ для корректной работы внутри WebApp
            box.innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com{tid}?autoplay=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
            document.getElementById('video-layer').style.display = 'flex';
        }

        function closeVideo() {
            document.getElementById('player-box').innerHTML = '';
            document.getElementById('video-layer').style.display = 'none';
        }

        // ОТПРАВКА В БОТ
        function sacrifice(id) {
            const uid = tg.initDataUnsafe?.user?.id;
            var p = 'https' + '://'; 
            var d = 'metal-art-mozlik1984.amvera.io' + '/';
            
            if (uid) {
                // Пытаемся вызвать карточку через API
                fetch(p + d + 'select?id=' + id + '&user_id=' + uid);
                tg.close();
            } else {
                tg.sendData(JSON.stringify({action: "sac", id: id}));
                tg.close();
            }
        }

        load();
    </script>
</body>
</html>
