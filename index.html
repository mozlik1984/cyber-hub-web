<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SACRIFICE HUB</title>
    <!-- ЗАЩИТА: Склеиваем библиотеку Telegram -->
    <script>
        var script = document.createElement('script');
        var p1 = 'https://'; var p2 = 'telegram.org/js/'; var p3 = 'telegram-web-app.js';
        script.src = p1 + p2 + p3;
        document.head.appendChild(script);
    </script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { --neon-purple: #bc13fe; --neon-blue: #05d9e8; --cyber-yellow: #f8ef00; --bg-dark: #050505; --card-bg: rgba(20, 20, 20, 0.9); }
        body { background: var(--bg-dark); color: #fff; font-family: 'Rajdhani', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        header { position: sticky; top: 0; background: rgba(5, 5, 5, 0.95); padding: 15px; z-index: 100; border-bottom: 1px solid var(--neon-purple); backdrop-filter: blur(10px); }
        .search-container { display: flex; gap: 10px; margin-top: 10px; }
        input { flex: 1; background: #1a1a1a; border: 1px solid var(--neon-blue); padding: 10px; color: #fff; outline: none; font-family: 'Rajdhani'; }
        .filter-btn { background: transparent; border: 1px solid var(--cyber-yellow); color: var(--cyber-yellow); padding: 5px 15px; cursor: pointer; font-family: 'Orbitron'; font-size: 0.7rem; }
        .filter-btn.active { background: var(--cyber-yellow); color: #000; }
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: var(--card-bg); border: 1px solid rgba(188, 19, 254, 0.2); border-radius: 5px; overflow: hidden; display: flex; flex-direction: column; transition: 0.3s; }
        .card.is-top { border: 1px solid var(--cyber-yellow); box-shadow: 0 0 10px rgba(248, 239, 0, 0.2); }
        .poster-container { position: relative; width: 100%; padding-top: 150%; background: #111; }
        .poster { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .info { padding: 10px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .title { color: var(--neon-blue); font-size: 0.85rem; font-weight: 700; line-height: 1.2; margin-bottom: 8px; }
        .sacrifice-btn { width: 100%; background: linear-gradient(45deg, var(--neon-purple), #8a2be2); border: none; color: #fff; padding: 8px; font-family: 'Orbitron'; font-size: 0.6rem; cursor: pointer; text-transform: uppercase; }
        #stats { font-size: 0.65rem; color: var(--neon-purple); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .error-msg { grid-column: 1/-1; text-align: center; color: #ff0055; padding: 40px 20px; font-family: 'Orbitron'; font-size: 0.8rem; }
    </style>
</head>
<body>
    <header>
        <div id="stats">HUB STATUS: INITIALIZING SYSTEM...</div>
        <div style="font-family: 'Orbitron'; color: var(--cyber-yellow); font-size: 1.1rem; letter-spacing: 2px;">SACRIFICE HUB</div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="SEARCH SECTOR..." oninput="filterMovies()">
            <button class="filter-btn" id="topFilter" onclick="toggleTopFilter()">TOP 100</button>
        </div>
    </header>

    <div class="movie-grid" id="container"></div>

    <script>
        // Ждем, пока загрузится библиотека Telegram
        setTimeout(() => {
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.ready();
                window.Telegram.WebApp.expand();
            }
        }, 500);

        let allMovies = [];
        let showOnlyTop = false;

        async function load() {
            const stats = document.getElementById('stats');
            const container = document.getElementById('container');
            
            try {
                stats.innerText = "HUB STATUS: ESTABLISHING CONNECTION...";
                
                // ЗАЩИТА: Склеиваем адрес API Amvera
                var protocol = 'https' + '://';
                var domain = 'metal-art-mozlik1984.amvera.io' + '/';
                var apiUrl = protocol + domain + '?v=' + new Date().getTime();
                
                const response = await fetch(apiUrl, {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' }
                });

                if (!response.ok) throw new Error('HTTP_' + response.status);

                allMovies = await response.json();
                stats.innerText = 'HUB STATUS: ONLINE | ' + allMovies.length + ' MOVIES';
                render(allMovies);

            } catch (e) {
                console.error(e);
                stats.innerText = 'HUB STATUS: ERROR [' + e.message + ']';
                container.innerHTML = '<div class="error-msg">SYSTEM FAILURE: ' + e.message + '</div>';
            }
        }

        function render(movies) {
            const container = document.getElementById('container');
            container.innerHTML = '';
            
            movies.forEach(m => {
                const card = document.createElement('div');
                card.className = 'card' + (m.is_top ? ' is-top' : '');
                
                // Склеиваем адрес заглушки, чтобы не обрезало
                var ph = 'https' + '://' + '://via.placeholder.com';
                var posterImg = m.img && m.img.includes('http') ? m.img : ph;

                card.innerHTML = `
                    <div class="poster-container">
                        <img class="poster" src="${posterImg}" loading="lazy">
                    </div>
                    <div class="info">
                        <div class="title">${(m.title || 'UNTITLED').toUpperCase()}</div>
                        <button class="sacrifice-btn" onclick="selectMovie(${m.id})">SACRIFICE</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function filterMovies() {
            const q = document.getElementById('searchInput').value.toLowerCase().trim();
            let filtered = allMovies.filter(m => {
                const titleStr = String(m.title || '').toLowerCase();
                const directorStr = String(m.director || '').toLowerCase();
                return titleStr.includes(q) || directorStr.includes(q);
            });
            if (showOnlyTop) filtered = filtered.filter(m => m.is_top === 1);
            render(filtered);
        }

        function toggleTopFilter() {
            showOnlyTop = !showOnlyTop;
            document.getElementById('topFilter').classList.toggle('active');
            filterMovies();
        }

        function selectMovie(id) {
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.sendData(JSON.stringify({action: "select", id: id}));
                window.Telegram.WebApp.close();
            }
        }

        load();
    </script>
</body>
</html>
