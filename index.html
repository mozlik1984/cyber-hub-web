<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CULT HUB v8.5</title>
    <script>
        var script = document.createElement('script');
        var p1 = 'https' + '://'; var p2 = 'telegram.org/js/'; var p3 = 'telegram-web-app.js';
        script.src = p1 + p2 + p3;
        document.head.appendChild(script);
    </script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
    @import url('https://googleapis.com');

    :root { 
        --neon-purple: #bc13fe; 
        --neon-blue: #05d9e8; 
        --cyber-yellow: #f8ef00; 
        --bg-dark: #020202; 
        --card-bg: rgba(10, 10, 10, 0.9); 
    }

    /* СКАНЛАЙНЫ ТОЛЬКО НА ФОНЕ BODY */
    body::before {
        content: " ";
        position: fixed;
        top: 0; left: 0; bottom: 0; right: 0;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%);
        z-index: 50; /* Ниже плеера, чтобы не мешать тексту */
        background-size: 100% 4px;
        pointer-events: none;
    }

    body { 
        background: var(--bg-dark); 
        color: #fff; 
        font-family: 'Rajdhani', sans-serif; 
        margin: 0; padding: 0; 
        overflow-x: hidden; 
        background-image: radial-gradient(circle at center, #1a0525 0%, #020202 100%);
    }

    header { 
        position: sticky; top: 0; 
        background: rgba(5, 5, 5, 0.9); 
        padding: 12px; z-index: 100; 
        border-bottom: 2px solid var(--neon-purple); 
        backdrop-filter: blur(15px); 
    }

    /* АДАПТИВНАЯ СЕТКА: от 2 на мобилках до 6+ на десктопе */
    .movie-grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(115px, 1fr)); 
        gap: 12px; 
        padding: 15px; 
    }
    @media (min-width: 768px) { .movie-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; } }
    @media (min-width: 1200px) { .movie-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); } }
    
    .card { 
        background: var(--card-bg); 
        border: 1px solid rgba(188, 19, 254, 0.3); 
        transition: 0.4s; position: relative; 
        opacity: 0; transform: scale(0.9);
        animation: summonCard 0.5s ease forwards;
    }
    .card:hover { border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(5, 217, 232, 0.4); }
    @keyframes summonCard { to { opacity: 1; transform: scale(1); } }

    .poster-container { position: relative; width: 100%; aspect-ratio: 2/3; overflow: hidden; }
    .poster { width: 100%; height: 100%; object-fit: cover; }

    .info { padding: 8px; background: #000; }
    .title { color: var(--neon-blue); font-size: 0.7rem; font-family: 'Orbitron'; text-transform: uppercase; height: 2.4em; overflow: hidden; }

    .sacrifice-btn { 
        width: 100%; background: transparent; border: 1px solid var(--neon-purple); 
        color: var(--neon-purple); padding: 6px; font-family: 'Orbitron'; 
        font-size: 0.55rem; cursor: pointer; 
    }

    /* VIDEO LAYER: ФИКСАЦИЯ ГЕОМЕТРИИ */
    #video-layer { 
        display: none; position: fixed; top: 0; left: 0; 
        width: 100%; height: 100%; background: rgba(0,0,0,0.95); 
        z-index: 10000; flex-direction: column; align-items: center; justify-content: center; 
    }

    .video-wrapper { 
        width: 95%; 
        max-width: 700px; 
        aspect-ratio: 16 / 10; /* Жесткий формат, чтобы лицо и спина не разъезжались */
        perspective: 2000px; 
    }

    .player-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
    .player-inner.flipped { transform: rotateY(180deg); }

    .player-front, .player-back { 
        position: absolute; width: 100%; height: 100%; 
        backface-visibility: hidden; 
        border: 2px solid var(--neon-blue); 
        background: #000; box-sizing: border-box; /* Важно для совпадения размеров */
    }

    .player-back { 
        transform: rotateY(180deg); 
        border-color: var(--neon-purple); 
        display: flex; flex-direction: column; padding: 15px;
        background: linear-gradient(135deg, #050505 0%, #10021a 100%);
    }

    .void-desc { 
        font-family: 'Rajdhani', sans-serif; 
        font-size: 1.2rem; /* Увеличили */
        line-height: 1.4; color: var(--neon-blue); 
        overflow-y: auto; flex-grow: 1; 
        text-transform: uppercase; 
        text-shadow: 0 0 10px rgba(5, 217, 232, 0.4);
        scrollbar-width: none;
    }

    .close-player-btn { 
        margin-top: 20px; background: transparent; color: var(--cyber-yellow); 
        border: 1px solid var(--cyber-yellow); padding: 10px 30px; 
        font-family: 'Orbitron'; font-size: 0.7rem; cursor: pointer;
    }
</style>
</head>
<body>
    <div id="video-layer">
        <div class="video-wrapper" id="player-container"></div>
        <button class="close-player-btn" onclick="closeVideo()">BACK TO HUB</button>
    </div>

    <header>
        <div id="stats">HUB STATUS: INITIALIZING...</div>
        <div style="font-family: 'Orbitron'; color: var(--cyber-yellow); font-size: 1rem; letter-spacing: 1px;">CULT CINEMA HUB <span style="font-size: 0.6rem; opacity: 0.6;">v8.5</span></div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="SEARCH..." oninput="filterMovies()">
            <button class="filter-btn" id="topFilter" onclick="toggleTopFilter()">TOP 100</button>
            <button class="filter-btn" id="myVoidFilter" onclick="loadMyArchive()">MY VOID</button>
        </div>
    </header>

    <div class="movie-grid" id="container"></div>

    <script>
                var tg = window.Telegram.WebApp;
        setTimeout(function() { if(tg) { tg.ready(); tg.expand(); } }, 500);

        var allMovies = [];
        var showOnlyTop = false;
        var showOnlyMy = false;

        async function load() {
            var stats = document.getElementById('stats');
            try {
                stats.innerText = "HUB STATUS: SYNCING DATA...";
                var p = 'https' + '://'; var d = 'metal-art-mozlik1984.amvera.io' + '/';
                var apiUrl = p + d + '?v=' + new Date().getTime();
                var response = await fetch(apiUrl);
                var data = await response.json();
                allMovies = data.filter((movie, index, self) => index === self.findIndex((m) => m.id === movie.id));
                stats.innerText = 'HUB STATUS: ONLINE | ' + allMovies.length + ' ENTITIES';
                render(allMovies);
            } catch (e) { stats.innerText = 'HUB STATUS: ERROR [' + e.message + ']'; }
        }

        async function loadMyArchive() {
            var stats = document.getElementById('stats');
            var btn = document.getElementById('myVoidFilter');
            var uid = tg.initDataUnsafe && tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : null;
            if (!uid) { tg.showAlert("VOID ERROR: USER NOT FOUND"); return; }
            showOnlyMy = !showOnlyMy;
            btn.classList.toggle('active');
            if (showOnlyMy) {
                stats.innerText = "OPENING YOUR PERSONAL ARCHIVE...";
                var p = 'https' + '://'; var d = 'metal-art-mozlik1984.amvera.io' + '/';
                var url = p + d + 'my_archive?user_id=' + uid;
                try {
                    var response = await fetch(url);
                    var myMovies = await response.json();
                    render(myMovies);
                } catch (e) { stats.innerText = "ERROR LOADING ARCHIVE"; }
            } else { load(); }
        }

                        function render(movies) {
            var container = document.getElementById('container');
            container.innerHTML = '';
            movies.forEach(function(m, index) {
                var card = document.createElement('div');
                card.className = 'card';
                card.style.animationDelay = (index * 0.05) + 's';
                var tid = String(m.t_id || "dQw4w9WgXcQ").trim().substring(0, 11);
                var img = (m.img && m.img.includes('http')) ? m.img : 'https://img.youtube.com' + tid + '/maxresdefault.jpg';
                var fb = "this.onerror=null;this.src='https://img.youtube.com" + tid + "/maxresdefault.jpg';";
                var h = '';
                // Добавляем ID в вызов функции
                h += '<div class="poster-container" onclick="openVideo(\'' + tid + '\', ' + m.id + ')">';
                h += '<img class="poster" src="' + img + '" onerror="' + fb + '" loading="lazy">';
                h += '<div style="position:absolute; top:5px; right:5px; background:rgba(0,0,0,0.8); padding:2px 6px; border-radius:4px; font-size:0.5rem; color:#f8ef00; border:1px solid #f8ef00; font-family:\'Orbitron\';">💀 ' + (m.sacrifices || 0) + '</div>';
                h += '</div>';
                h += '<div class="info"><div><div class="title">' + (m.title || 'UNTITLED') + '</div></div>';
                h += '<button class="sacrifice-btn" onclick="selectMovie(' + m.id + ')">VIEW CARD</button></div>';
                card.innerHTML = h;
                container.appendChild(card);
            });
        }

        function openVideo(tid, mid) {
            var movie = allMovies.find(function(x) { return x.id == mid; });
            var id = String(tid).trim().substring(0, 11);
            var layer = document.getElementById('video-layer');
            var cont = document.getElementById('player-container');
            
            // ТВОИ ОРИГИНАЛЬНЫЕ ССЫЛКИ
            var S = '/'; var C = ':'; var P = 'https' + C + S + S;
            var embedUrl = P + 'www.youtube-nocookie.com' + S + 'embed' + S + id + '?rel=0&playsinline=1';
            var watchUrl = P + 'www.youtube.com' + S + 'watch?v=' + id;
            
            var desc = movie ? (movie.description || "DATA MISSING") : "DATA MISSING";
            if (desc.includes("ДАННЫЕ")) desc = "DATA MISSING";

            var h = '<div class="player-inner" id="player-mirror">';
            
            // ЛИЦО: ТВОЙ РАБОЧИЙ ПЛЕЕР
            h += '<div class="player-front" style="display:flex; flex-direction:column;">';
            h += '<iframe style="width:100%; flex-grow:1; border:0;" src="' + embedUrl + '" allowfullscreen></iframe>';
            h += '<div style="display:flex; height:45px; border-top:1px solid #333;">';
            h += '<button onclick="flipPlayer()" style="flex:1; background:#bc13fe; color:#fff; border:0; font-family:\'Orbitron\'; font-size:9px; cursor:pointer;">INFO [i]</button>';
            h += '<a href="' + watchUrl + '" target="_blank" style="flex:1; background:#ff0000; color:#fff; text-decoration:none; display:flex; align-items:center; justify-content:center; font-family:\'Orbitron\'; font-size:9px; font-weight:bold;">YOUTUBE APP</a>';
            h += '</div>';
            h += '</div>';

            // СПИНА: ОПИСАНИЕ
            h += '<div class="player-back" onclick="flipPlayer()">';
            h += '<div style="font-family:\'Orbitron\'; color:#05d9e8; border-bottom:1px solid #333; padding-bottom:5px; font-size:10px; margin-bottom:10px;">MISSION LOG // DATA_RECOVERY</div>';
            h += '<div class="void-desc" style="color:var(--neon-blue);">' + desc + '</div>';
            h += '<div style="color:#f8ef00; font-family:\'Orbitron\'; font-size:8px; text-align:center; margin-top:10px;">TAP TO RESUME VIDEO</div>';
            h += '</div>';

            h += '</div>';
            cont.innerHTML = h;
            layer.style.display = 'flex';
        }

        function flipPlayer() {
            var m = document.getElementById('player-mirror');
            if (m) m.classList.toggle('flipped');
        }

        function closeVideo() { document.getElementById('player-container').innerHTML = ''; document.getElementById('video-layer').style.display = 'none'; }

        function filterMovies() {
            var q = document.getElementById('searchInput').value.toLowerCase().trim();
            var filtered = allMovies.filter(function(m) { return (String(m.title) + String(m.director) + String(m.genre)).toLowerCase().includes(q); });
            if (showOnlyTop) { filtered = filtered.filter(function(m) { return m.is_top === 1; }); }
            render(filtered);
        }

        function toggleTopFilter() { showOnlyTop = !showOnlyTop; document.getElementById('topFilter').classList.toggle('active'); filterMovies(); }

        async function selectMovie(id) {
            if (!tg) return;
            var uid = tg.initDataUnsafe && tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : null;
            if (uid) {
                var p = 'https' + '://'; var d = 'metal-art-mozlik1984.amvera.io' + '/';
                var url = p + d + 'select?id=' + id + '&user_id=' + uid;
                try { await fetch(url); tg.close(); } catch (e) { tg.close(); }
            } else { tg.close(); }
        }
        load();
    </script>
</body>
</html>
